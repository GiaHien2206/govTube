<!doctype html>
<html>

<head>

<title>GovTrendTube AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0b1020;
color:white;
font-family:system-ui;
margin:0;
}

.wrap{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#121a33;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:8px;
border:none;
}

button{
padding:8px 10px;
border-radius:8px;
border:none;
background:#7aa2ff;
color:white;
cursor:pointer;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="wrap">

<div class="card">

<h2>Manual Prediction</h2>

<input id="like" value="500">
<input id="comment" value="20">
<input id="hours" value="100">

<button onclick="predict()">Predict</button>

<canvas id="probChart"></canvas>

</div>

<div class="card">

<h2>YouTube Link Analyzer</h2>

<input id="yturl" placeholder="Paste YouTube link">

<button onclick="youtubePredict()">Analyze</button>

<h4 id="title"></h4>

<canvas id="ytChart"></canvas>

</div>

<div class="card">

<h2>Engagement Growth</h2>

<canvas id="tsChart"></canvas>

</div>

<div class="card">

<h2>SHAP Feature Importance</h2>

<img src="/outputs/shap_summary.png" width="100%">

</div>

<div class="card">

<h2>Burst Detection</h2>

<img src="/outputs/time.png" width="100%">

</div>

</div>

<script>

function drawProbChart(canvasId,prob){

new Chart(document.getElementById(canvasId),{

type:"bar",

data:{
labels:["Trending","Not Trending"],
datasets:[{
label:"Probability",
data:[prob,1-prob],
backgroundColor:["green","red"]
}]
}

})

}

function drawTimeSeries(ts){

new Chart(document.getElementById("tsChart"),{

type:"line",

data:{
labels:ts.hours,
datasets:[
{
label:"Views",
data:ts.views,
borderColor:"blue"
},
{
label:"Likes",
data:ts.likes,
borderColor:"green"
},
{
label:"Comments",
data:ts.comments,
borderColor:"orange"
}
]
}

})

}

async function predict(){

const like=document.getElementById("like").value
const comment=document.getElementById("comment").value
const hours=document.getElementById("hours").value

const r=await fetch("/api/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({like,comment,hours})
})

const data=await r.json()

drawProbChart("probChart",data.prob)

}

async function youtubePredict(){

const url=document.getElementById("yturl").value

const r=await fetch("/api/youtube_predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url})
})

const data=await r.json()

document.getElementById("title").innerText=data.stats.title

drawProbChart("ytChart",data.prob)

drawTimeSeries(data.timeseries)

}

</script>

</body>

</html>
